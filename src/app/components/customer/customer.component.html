<app-card title="Customer Information" subtitle="List of Customers">
  <div card-body>
    @if (customers.length === 0) {
      <div class="text-muted">
        Loading customers...
      </div>
    }
    @if (customers.length > 0) {
      <div>
        <ul class="list-unstyled">
          @for (customer of customers; track customer.id) {
            <li class="mb-2 p-2 border rounded">
              <strong>{{ customer.firstName }} {{ customer.lastName }}</strong><br>
              <small class="text-muted">{{ customer.email }}</small><br>
            </li>
          }
        </ul>
      </div>
    }
  </div>
  <div card-footer>
    app powered by Angular
  </div>
</app-card>

<!-- Router outlet for child routes (edit, create, detail) -->
<router-outlet></router-outlet>

<div class="row">
  <div class="col-sm">
    <nav
      style="--bs-breadcrumb-divider: '>';" aria-label="breadcrumb"
    >
      <ol class="breadcrumb">
        @for (b of breadcrumbs; track $index) {
          @if (b.active) {
            <li class="{{ b.class }}">{{ b.label }}</li>
          } @else {
            <li class="{{ b.class }}"><a [routerLink]="b.url">{{ b.label }}</a></li>
          }
        }
      </ol>
    </nav>
  </div>
</div>
